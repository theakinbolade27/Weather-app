<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-shell">
    <nav class="top-nav">
      <div class="brand">Weather App</div>
      <form role="search" id="searchForm" class="nav-search">
        <label for="q" class="visually-hidden">Search city</label>
        <input type="search" id="q" name="q" placeholder="Search city..." aria-label="Search city" />
        <button type="submit">Search</button>
      </form>
    </nav>

    <main class="main-card">
      <section class="hero-card">
        <div class="hero-icon">☀️</div>
        <div class="hero-copy">
          <div class="city-name" id="cityName">Akure</div>
          <div class="temperature" id="temperature">33°C</div>
          <div class="weather-description" id="description">Sunny</div>
        </div>
      </section>

      <section class="stats-row">
        <div class="stat-card">
          <div class="stat-label">Humidity</div>
          <div class="stat-value" id="humidity">65%</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Wind Speed</div>
          <div class="stat-value" id="windSpeed">12 mph</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">UV Index</div>
          <div class="stat-value" id="uvIndex">4</div>
        </div>
      </section>

      <section class="forecast-section">
        <div class="forecast-header">5-Day Forecast</div>
        <div class="forecast-list">
          <div class="forecast-row">
            <div class="forecast-day">Today</div>
            <div class="forecast-icon">☀️</div>
            <div class="forecast-temp"><span class="high">34°</span><span class="low">27°</span></div>
          </div>

          <div class="forecast-row">
            <div class="forecast-day">Tuesday</div>
            <div class="forecast-icon">⛅</div>
            <div class="forecast-temp"><span class="high">31°</span><span class="low">25°</span></div>
          </div>

          <div class="forecast-row">
            <div class="forecast-day">Wednesday</div>
            <div class="forecast-icon">🌧️</div>
            <div class="forecast-temp"><span class="high">28°</span><span class="low">24°</span></div>
          </div>

          <div class="forecast-row">
            <div class="forecast-day">Thursday</div>
            <div class="forecast-icon">⛅</div>
            <div class="forecast-temp"><span class="high">27°</span><span class="low">23°</span></div>
          </div>

          <div class="forecast-row">
            <div class="forecast-day">Friday</div>
            <div class="forecast-icon">☀️</div>
            <div class="forecast-temp"><span class="high">33°</span><span class="low">26°</span></div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
